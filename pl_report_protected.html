async function unlock() {
  const pw = document.getElementById('pw').value;
  try {
    const raw = Uint8Array.from(atob(BLOB), c => c.charCodeAt(0));
    const salt = raw.slice(0,16), iv = raw.slice(16,28), tag = raw.slice(28,44), ct = raw.slice(44);
    const ctWithTag = new Uint8Array([...ct, ...tag]);
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM',iv}, key, ctWithTag);
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch(e) {
    document.getElementById('err').style.display = 'block';
  }
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
