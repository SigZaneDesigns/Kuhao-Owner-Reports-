<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sig Zane Designs — Dashboards</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --header-bg: #F4A820;
    --bg:        #fdf8f0;
    --card:      #ffffff;
    --border:    #e8dcc8;
    --surface:   #fef6e8;
    --cream:     #f5ead8;
    --text:      #2a1f10;
    --muted:     #7a6a55;
    --accent:    #d4890a;
    --gold:      #c07d08;
    --yellow:    #e6b800;
    --t-xs:   0.68rem;
    --t-sm:   0.75rem;
    --t-base: 0.85rem;
    --t-lg:   1.1rem;
    --t-title:1.65rem;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:var(--t-base);
    min-height:100vh;
  }

  /* Header */
  .page-banner{
    background:var(--header-bg);
    padding:28px 40px;
    display:flex;
    align-items:center;
    gap:18px;
  }
  .logo-box{width:90px;height:64px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .logo-box img{width:90px;height:auto;object-fit:contain;}
  .banner-title{color:#fff;}
  .banner-title .co-name{font-size:var(--t-xs);letter-spacing:.15em;text-transform:uppercase;opacity:.85;font-weight:700;margin-bottom:4px;}
  .banner-title h1{font-size:var(--t-title);font-weight:800;line-height:1.05;}
  .banner-title .banner-sub{font-size:var(--t-sm);opacity:.8;margin-top:5px;}

  /* Body */
  .body-wrap{max-width:900px;margin:0 auto;padding:48px 24px 80px;}

  /* Section labels */
  .section-label{
    font-size:var(--t-xs);font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin-bottom:14px;padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }
  .section-group{margin-bottom:36px;}

  /* Grid */
  .report-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:600px){.report-grid{grid-template-columns:1fr;}}

  /* Cards */
  .report-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px;
    box-shadow:var(--shadow);
    text-decoration:none;
    color:inherit;
    display:flex;
    flex-direction:column;
    gap:12px;
    transition:box-shadow .15s, transform .15s;
    position:relative;
    overflow:hidden;
  }
  .report-card::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg, var(--gold), var(--yellow));
  }
  .report-card:hover{
    box-shadow:0 8px 28px rgba(42,31,16,.12);
    transform:translateY(-2px);
  }
  .rc-title{font-size:var(--t-lg);font-weight:700;color:var(--text);}
  .rc-meta{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{
    font-size:var(--t-xs);font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:2px 8px;border-radius:20px;
    background:var(--cream);color:var(--accent);
    border:1px solid var(--border);
  }
  .rc-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--header-bg);
    color:#fff;
    padding:9px 16px;
    border-radius:8px;
    font-size:var(--t-sm);font-weight:700;
    text-decoration:none;
    transition:opacity .15s;
    align-self:flex-start;
    margin-top:auto;
  }
  .rc-btn:hover{opacity:.88;}
  .rc-btn svg{width:13px;height:13px;fill:currentColor;flex-shrink:0;}

  /* Footer */
  footer{
    margin-top:48px;
    border-top:1px solid var(--border);
    padding-top:20px;
    text-align:center;
    font-size:var(--t-sm);
    color:var(--muted);
  }
  footer span{color:var(--accent);}
</style>
</head>
<body>

<div class="page-banner">
  <div class="logo-box">
    <img src="https://cdn.shopify.com/s/files/1/0964/2498/files/logo-small-white.png?v=1632376865" alt="Sig Zane Designs">
  </div>
  <div class="banner-title">
    <div class="co-name">Kuhao, Inc. dba Sig Zane Designs</div>
    <h1>Dashboards</h1>
    <div class="banner-sub">Confidential</div>
  </div>
</div>

<div class="body-wrap">

  <div class="section-group">
    <div class="report-grid">

      <a class="report-card" href="bs_report_protected.html">
        <div class="rc-title">Balance Sheet</div>
        <div class="rc-meta">
          <span class="tag">Jun 30, 2026</span>
          <span class="tag">vs May 2026</span>
        </div>
        <span class="rc-btn">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/></svg>
          View Report
        </span>
      </a>

      <a class="report-card" href="pl_report_protected.html">
        <div class="rc-title">Profit &amp; Loss</div>
        <div class="rc-meta">
          <span class="tag">Jun 2026</span>
          <span class="tag">Jan–Jun YTD</span>
        </div>
        <span class="rc-btn">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/></svg>
          View Report
        </span>
      </a>

    </div>
  </div>


</div>

<footer>
  Kuhao, Inc. dba <span>Sig Zane Designs</span> &nbsp;·&nbsp; Confidential &amp; Proprietary
</footer>

</body>
</html>
