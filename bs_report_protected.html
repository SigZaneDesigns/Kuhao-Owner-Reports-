<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    border-radius:12px;

    border:1.5px solid #e8dcc8;
    border-radius:8px;
    font-size:0.95rem;
    font-family:inherit;
    color:#2a1f10;
    background:#fdf8f0;
    outline:none;
    transition:border-color .15s;
    margin-bottom:14px;
  }
  input[type=password]:focus{border-color:#F4A820;}
  button{
    width:100%;padding:12px;
    background:#F4A820;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:0.9rem;font-weight:700;
    cursor:pointer;
    transition:opacity .15s;
    font-family:inherit;
  }
  button:hover{opacity:.9;}
  .err{
    margin-top:14px;
    font-size:0.78rem;
    color:#c03020;
    display:none;
  }
  .spin{display:none;margin-top:16px;color:#7a6a55;font-size:0.78rem;}
</style>

async function decrypt() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  document.getElementById('err').style.display = 'none';
  document.getElementById('spin').style.display = 'block';

  try {
    const raw     = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
    const salt    = raw.slice(0, 16);
    const iv      = raw.slice(16, 28);
    const tag     = raw.slice(28, 44);
    const ct      = raw.slice(44);
    // Combine ciphertext + tag for SubtleCrypto (it expects them concatenated)
    const ctWithTag = new Uint8Array([...ct, ...tag]);

    const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key    = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ctWithTag);
    const html  = new TextDecoder().decode(plain);

    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('err').style.display  = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') decrypt(); });
</script>
